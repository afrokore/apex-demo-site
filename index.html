<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Apex Operations Automation Demo</title>
<style>
  :root {
    --bg: #000000;
    --bg-2: #080808;
    --panel: rgba(12, 12, 12, 0.88);
    --panel-strong: #0f0f0f;
    --panel-soft: #161616;
    --stroke: rgba(148, 163, 184, 0.14);
    --text: #e5eefb;
    --muted: #91a3bf;
    --gold: #d8a93e;
    --gold-soft: rgba(216, 169, 62, 0.16);
    --blue: #47a0ff;
    --blue-soft: rgba(71, 160, 255, 0.16);
    --green: #2ec989;
    --green-soft: rgba(46, 201, 137, 0.16);
    --red: #ff6b67;
    --red-soft: rgba(255, 107, 103, 0.14);
    --amber: #ffb34d;
    --amber-soft: rgba(255, 179, 77, 0.15);
    --shadow: 0 30px 80px rgba(0, 0, 0, 0.35);
    --radius-lg: 28px;
    --radius-md: 20px;
    --radius-sm: 14px;
  }

  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  body {
    font-family: "Avenir Next", "Segoe UI", "Helvetica Neue", sans-serif;
    background:
      radial-gradient(circle at top left, rgba(71, 160, 255, 0.10), transparent 30%),
      radial-gradient(circle at top right, rgba(216, 169, 62, 0.09), transparent 24%),
      #000000;
    color: var(--text);
    min-height: 100vh;
  }

  body::before {
    content: "";
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(148, 163, 184, 0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(148, 163, 184, 0.03) 1px, transparent 1px);
    background-size: 34px 34px;
    pointer-events: none;
    mask-image: linear-gradient(180deg, rgba(0,0,0,0.5), transparent 90%);
  }

  button {
    font: inherit;
  }

  table {
    border-collapse: collapse;
    width: 100%;
  }

  ::-webkit-scrollbar {
    width: 8px;
    height: 8px;
  }

  ::-webkit-scrollbar-thumb {
    background: rgba(148, 163, 184, 0.28);
    border-radius: 999px;
  }

  .panel {
    background: var(--panel);
    border: 1px solid var(--stroke);
    border-radius: var(--radius-md);
    box-shadow: var(--shadow);
    backdrop-filter: blur(18px);
  }

  .pill {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 7px 12px;
    border-radius: 999px;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.03em;
    text-transform: uppercase;
  }

  .hover-row:hover {
    background: rgba(255, 255, 255, 0.025);
  }

  .fade-in {
    animation: fadeInUp .45s ease both;
  }

  @keyframes fadeInUp {
    from {
      opacity: 0;
      transform: translateY(16px);
    }
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  /* ── MOBILE NAV ── */
  #mobileBar { display: none; }
  #mobileOverlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.55); z-index: 299; backdrop-filter: blur(2px); }
  #mobileOverlay.open { display: block; }

  @media (max-width: 980px) {
    .app-shell { display: block !important; }

    #mobileBar {
      display: flex;
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 52px;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      background: rgba(6,6,6,0.98);
      border-bottom: 1px solid rgba(148,163,184,0.14);
      z-index: 301;
      backdrop-filter: blur(16px);
    }
    #waffleBtn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 38px; height: 38px;
      border-radius: 10px;
      border: 1px solid rgba(148,163,184,0.14);
      background: rgba(255,255,255,0.04);
      color: #91a3bf;
      cursor: pointer;
      transition: all .15s;
    }
    #waffleBtn:hover { background: rgba(255,255,255,0.08); color: #e5eefb; }

    .sidebar {
      position: fixed !important;
      top: 0 !important; left: -290px !important; bottom: 0 !important;
      width: 268px !important;
      height: 100% !important;
      margin: 0 !important;
      border-radius: 0 24px 24px 0 !important;
      border-left: none !important;
      padding-top: 68px !important;
      transition: left .25s ease !important;
      z-index: 300;
      overflow-y: auto;
    }
    .sidebar.nav-open { left: 0 !important; }

    .main-content {
      margin-left: 0 !important;
      width: 100% !important;
      max-width: 100vw !important;
      padding: 68px 16px 24px !important;
      overflow-x: hidden;
    }

    body {
      overflow-x: hidden;
    }
  }

  @media (max-width: 720px) {
    .hero-grid,
    .kpi-grid,
    .two-col,
    .three-col,
    .brief-grid,
    .detail-grid,
    .role-grid {
      grid-template-columns: 1fr !important;
    }

    .hide-mobile {
      display: none !important;
    }

    .panel {
      overflow-x: hidden;
    }
  }
</style>
</head>

function IconBadge({ icon: Icon, color, bg, size = 18 }) {
  return (
    <div style={{ width: 38, height: 38, borderRadius: 12, background: bg, display: "grid", placeItems: "center", border: `1px solid ${color}33` }}>
      <Icon size={size} color={color} />

}

function Pill({ text, color, bg, icon: Icon }) {
  return (
    <span className="pill" style={{ color, background: bg, border: `1px solid ${color}22` }}>
      {Icon ? <Icon size={14} color={color} /> : null}
      {text}
    </span>
  );
}

function Panel({ children, style, className = "" }) {
  return <div className={`panel ${className}`.trim()} style={style}>{children}</div>;
}

function SectionTitle({ eyebrow, title, description, right }) {
  return (
    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-end", gap: 20, flexWrap: "wrap", marginBottom: 18 }}>
      <div>
        {eyebrow ? <div style={{ fontSize: 11, textTransform: "uppercase", letterSpacing: "0.18em", color: C.gold, marginBottom: 8, fontWeight: 700 }}>{eyebrow}</div> : null}
        <div style={{ fontSize: 24, fontWeight: 700, letterSpacing: "-0.03em", color: C.text }}>{title}</div>
        {description ? <div style={{ fontSize: 14, color: C.muted, marginTop: 8, maxWidth: 760, lineHeight: 1.5 }}>{description}</div> : null}
      </div>
      {right}
    </div>
  );
}

function SummaryCard({ card }) {

      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", gap: 12, position: "relative" }}>
        <div>
          <div style={{ fontSize: 12, color: C.muted, textTransform: "uppercase", letterSpacing: "0.16em", fontWeight: 700 }}>{card.label}</div>
          <div style={{ marginTop: 12, fontSize: 34, fontWeight: 750, letterSpacing: "-0.05em" }}>{card.value}</div>
          <div style={{ marginTop: 8, fontSize: 13, color: card.color }}>{card.sub}</div>
        </div>
        <IconBadge icon={Icon} color={card.color} bg={card.glow} size={20} />
      </div>
    </Panel>
  );
}

      <div style={{ fontSize: 13, color: C.muted, marginTop: 8 }}>{item.note}</div>

}

          <div style={{ marginTop: 8, fontSize: 28, fontWeight: 750, color: stage.accent }}>{stage.count}</div>
          <div style={{ marginTop: 4, fontSize: 13, color: C.text }}>{stage.value}</div>
        </div>
        <div style={{ width: 10, alignSelf: "stretch", borderRadius: 999, background: `${stage.accent}26` }}>
          <div style={{ height: `${Math.min(stage.count * 12, 100)}%`, borderRadius: 999, background: stage.accent }} />
        </div>
      </div>
      <div style={{ marginTop: 16, display: "grid", gap: 8 }}>
        {stage.items.map((item, index) => (
          <div key={index} style={{ display: "flex", alignItems: "center", gap: 8, fontSize: 13, color: C.muted }}>
            <div style={{ width: 6, height: 6, borderRadius: "50%", background: stage.accent, flexShrink: 0 }} />
            <span>{item}</span>
          </div>
        ))}
      </div>
    </div>
  );
}

function StatusPill({ tone, children }) {
  const styles = toneMap[tone];
  return <span style={{ display: "inline-flex", padding: "6px 10px", borderRadius: 999, background: styles.bg, color: styles.color, fontSize: 12, fontWeight: 700 }}>{children}</span>;
}

              </th>
            ))}
          </tr>
        </thead>

            <tr key={rowIndex} className="hover-row" style={{ borderBottom: rowIndex === rows.length - 1 ? "none" : `1px solid rgba(148, 163, 184, 0.08)` }}>

          </div>
        </div>

        <Panel style={{ padding: 12, background: "rgba(255,255,255,0.03)" }}>
          <div style={{ fontSize: 11, textTransform: "uppercase", letterSpacing: "0.16em", color: C.gold, fontWeight: 700 }}>Campaign Demo</div>
          <div style={{ fontSize: 20, fontWeight: 760, marginTop: 8 }}>5:00 AM</div>
          <div style={{ marginTop: 3, fontSize: 12, color: C.muted }}>Executive brief delivery time</div>
          <div style={{ marginTop: 10, display: "flex", gap: 6, flexWrap: "wrap" }}>
            <Pill text="Gmail" color={C.blue} bg={C.blueSoft} icon={Icons.mail} />
            <Pill text="Calendar" color={C.green} bg={C.greenSoft} icon={Icons.calendar} />
          </div>
        </Panel>

        <div style={{ display: "grid", gap: 3 }}>
          {navItems.map((item) => {
            const Icon = item.icon;
            const active = item.id === view;
            return (
              <button
                key={item.id}
                onClick={() => handleNav(item.id)}
                style={{
                  background: active ? "linear-gradient(90deg, rgba(216,169,62,0.18), rgba(71,160,255,0.14))" : "transparent",
                  color: active ? C.text : C.muted,
                  border: active ? `1px solid rgba(216,169,62,0.22)` : "1px solid transparent",
                  borderRadius: 15,
                  padding: "9px 12px",
                  display: "flex",
                  alignItems: "center",
                  gap: 10,
                  width: "100%",
                  minWidth: 0,
                  cursor: "pointer",
                  textAlign: "left",
                  transition: "all .2s ease",
                }}
              >
                <Icon size={16} color={active ? C.gold : C.muted} />
                <span style={{ fontSize: 13.5, fontWeight: active ? 700 : 600, flex: 1, minWidth: 0, overflowWrap: "anywhere", lineHeight: 1.2 }}>{item.label}</span>
              </button>
            );
          })}
        </div>

        <div style={{ marginTop: 2 }}>
          <Panel style={{ padding: 12, background: "rgba(255,255,255,0.03)" }}>
            <div style={{ fontSize: 11.5, color: C.muted }}>Logged in as</div>
            <div style={{ marginTop: 5, display: "flex", alignItems: "center", gap: 9 }}>
              <div style={{ width: 30, height: 30, borderRadius: 10, background: C.blueSoft, display: "grid", placeItems: "center" }}>
                <Icons.user size={16} color={C.blue} />
              </div>
              <div>
                <div style={{ fontWeight: 700, fontSize: 13.5 }}>Nate</div>
                <div style={{ fontSize: 11.5, color: C.muted }}>Owner view</div>
              </div>
            </div>
          </Panel>
        </div>
      </aside>

      <main className="main-content" style={mainStyle}>
        <div style={{ display: "grid", gap: 20 }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", gap: 16, flexWrap: "wrap" }}>
            <div>
              <div style={{ fontSize: 34, fontWeight: 780, letterSpacing: "-0.06em" }}>{titles[view].title}</div>
              <div style={{ marginTop: 8, color: C.muted, fontSize: 14, lineHeight: 1.55 }}>{titles[view].description}</div>
            </div>
            <div style={{ display: "flex", alignItems: "center", gap: 10, flexWrap: "wrap" }}>
              <Pill text="Interactive mockup" color={C.gold} bg={C.goldSoft} icon={Icons.spark} />
              <Pill text="For demos only" color={C.blue} bg={C.blueSoft} icon={Icons.brief} />
            </div>
          </div>

          {view === "overview" ? <OverviewView /> : null}
          {view === "brief" ? <BriefView /> : null}
          {view === "pipeline" ? <PipelineView /> : null}
          {view === "finance" ? <FinanceView /> : null}
          {view === "automation" ? <AutomationView /> : null}
          {view === "access" ? <AccessView /> : null}
        </div>
      </main>
    </div>
  );
}

ReactDOM.render(<App />, document.getElementById("root"));
</script>
</body>
</html>
