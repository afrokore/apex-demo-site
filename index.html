<style>
  :root {
    --bg: #000000;
    --bg-2: #080808;

    --panel-strong: #0f0f0f;
    --panel-soft: #161616;
    --stroke: rgba(148, 163, 184, 0.14);
    --text: #e5eefb;
    --muted: #91a3bf;
    --gold: #d8a93e;
    --gold-soft: rgba(216, 169, 62, 0.16);
    --blue: #47a0ff;
    --blue-soft: rgba(71, 160, 255, 0.16);
    --green: #2ec989;
    --green-soft: rgba(46, 201, 137, 0.16);
    --red: #ff6b67;
    --red-soft: rgba(255, 107, 103, 0.14);
    --amber: #ffb34d;
    --amber-soft: rgba(255, 179, 77, 0.15);
    --shadow: 0 30px 80px rgba(0, 0, 0, 0.35);
    --radius-lg: 28px;
    --radius-md: 20px;
    --radius-sm: 14px;
  }

  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  body {
    font-family: "Avenir Next", "Segoe UI", "Helvetica Neue", sans-serif;
    background:
      radial-gradient(circle at top left, rgba(71, 160, 255, 0.10), transparent 30%),
      radial-gradient(circle at top right, rgba(216, 169, 62, 0.09), transparent 24%),
      #000000;
    color: var(--text);
    min-height: 100vh;
  }

  body::before {
    content: "";
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(148, 163, 184, 0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(148, 163, 184, 0.03) 1px, transparent 1px);
    background-size: 34px 34px;
    pointer-events: none;
    mask-image: linear-gradient(180deg, rgba(0,0,0,0.5), transparent 90%);
  }

  button {
    font: inherit;
  }

  table {
    border-collapse: collapse;
    width: 100%;
  }

  ::-webkit-scrollbar {
    width: 8px;
    height: 8px;
  }

  ::-webkit-scrollbar-thumb {
    background: rgba(148, 163, 184, 0.28);
    border-radius: 999px;
  }

  .panel {
    background: var(--panel);
    border: 1px solid var(--stroke);
    border-radius: var(--radius-md);
    box-shadow: var(--shadow);
    backdrop-filter: blur(18px);
  }

  .pill {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 7px 12px;
    border-radius: 999px;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.03em;
    text-transform: uppercase;
  }

  .hover-row:hover {
    background: rgba(255, 255, 255, 0.025);
  }

  .fade-in {
    animation: fadeInUp .45s ease both;
  }

  @keyframes fadeInUp {
    from {
      opacity: 0;
      transform: translateY(16px);
    }
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  /* ── MOBILE NAV ── */
  #mobileBar { display: none; }
  #mobileOverlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.55); z-index: 299; backdrop-filter: blur(2px); }
  #mobileOverlay.open { display: block; }

  @media (max-width: 980px) {
    .app-shell { display: block !important; }

    #mobileBar {
      display: flex;
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 52px;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      background: rgba(6,6,6,0.98);
      border-bottom: 1px solid rgba(148,163,184,0.14);
      z-index: 301;
      backdrop-filter: blur(16px);
    }
    #waffleBtn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 38px; height: 38px;
      border-radius: 10px;
      border: 1px solid rgba(148,163,184,0.14);
      background: rgba(255,255,255,0.04);
      color: #91a3bf;
      cursor: pointer;
      transition: all .15s;
    }
    #waffleBtn:hover { background: rgba(255,255,255,0.08); color: #e5eefb; }

    .sidebar {
      position: fixed !important;
      top: 0 !important; left: -290px !important; bottom: 0 !important;
      width: 268px !important;
      height: 100% !important;
      margin: 0 !important;
      border-radius: 0 24px 24px 0 !important;
      border-left: none !important;
      padding-top: 68px !important;
      transition: left .25s ease !important;
      z-index: 300;
      overflow-y: auto;
    }
    .sidebar.nav-open { left: 0 !important; }

    .main-content {
      margin-left: 0 !important;
      width: 100% !important;
      max-width: 100vw !important;
      padding: 68px 16px 24px !important;
      overflow-x: hidden;
    }

    body {
      overflow-x: hidden;
    }
  }

  @media (max-width: 720px) {
    .hero-grid,
    .kpi-grid,
    .two-col,
    .three-col,
    .brief-grid,
    .detail-grid,
    .role-grid {
      grid-template-columns: 1fr !important;
    }

    .hide-mobile {
      display: none !important;
    }

    .panel {
      overflow-x: hidden;
    }
  }
</style>

function PieChart({ eyebrow, title, segments, totalLabel, totalSub }) {
  const r = 58;
  const cx = 85;
  const cy = 85;
  const circ = 2 * Math.PI * r;
  const strokeW = 22;
  const total = segments.reduce((sum, s) => sum + s.value, 0);
  let cumulative = 0;
  const slices = segments.map(s => {
    const len = (s.value / total) * circ;
    const slice = { ...s, len, offset: cumulative };
    cumulative += len;
    return slice;
  });
  return (
    <Panel className="fade-in" style={{ padding: 22 }}>
      <div style={{ fontSize: 11, textTransform: "uppercase", letterSpacing: "0.16em", color: C.muted, fontWeight: 700, marginBottom: 6 }}>{eyebrow}</div>
      <div style={{ fontSize: 20, fontWeight: 740, marginBottom: 20 }}>{title}</div>
      <div style={{ display: "flex", alignItems: "center", gap: 24 }}>
        <div style={{ flexShrink: 0 }}>
          <svg width={170} height={170} viewBox="0 0 170 170">
            <circle cx={cx} cy={cy} r={r} fill="none" stroke="rgba(255,255,255,0.06)" strokeWidth={strokeW} />
            {slices.map((s, i) => (
              <circle key={i} cx={cx} cy={cy} r={r} fill="none"
                stroke={s.color} strokeWidth={strokeW}
                strokeDasharray={`${s.len} ${circ}`}
                strokeDashoffset={circ / 4 - s.offset}
                strokeLinecap="butt"
              />
            ))}
            <text x={cx} y={cy - 8} textAnchor="middle" fill={C.text} fontSize="18" fontWeight="700">{totalLabel}</text>
            <text x={cx} y={cy + 12} textAnchor="middle" fill={C.muted} fontSize="11">{totalSub}</text>
          </svg>
        </div>
        <div style={{ flex: 1, display: "grid", gap: 14 }}>
          {segments.map((s, i) => (
            <div key={i}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", gap: 8, marginBottom: 5 }}>
                <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                  <div style={{ width: 10, height: 10, borderRadius: 3, background: s.color, flexShrink: 0 }} />
                  <span style={{ fontSize: 13, color: C.muted }}>{s.label}</span>
                </div>
                <span style={{ fontSize: 14, fontWeight: 700, color: s.color }}>{s.display}</span>
              </div>
              <div style={{ height: 4, borderRadius: 999, background: "rgba(255,255,255,0.06)", overflow: "hidden" }}>
                <div style={{ height: "100%", width: `${(s.value / total) * 100}%`, background: s.color, borderRadius: 999 }} />
              </div>
            </div>
          ))}
        </div>
      </div>
    </Panel>
  );
}

                <div style={{ marginTop: 4, fontSize: 12, color: C.muted }}>{item.client} · {item.assignee}</div>
              </div>
              <span style={{ display: "inline-flex", padding: "4px 9px", borderRadius: 8, background: item.priority === "High" ? "rgba(255,107,103,0.12)" : item.priority === "Medium" ? "rgba(255,179,77,0.12)" : "rgba(148,163,184,0.08)", color: item.priority === "High" ? C.red : item.priority === "Medium" ? C.amber : C.muted, fontSize: 11, fontWeight: 700 }}>{item.priority}</span>
              <span style={{ fontSize: 12, color: item.due === "Today" || item.due === "10:30 AM" ? C.red : item.due === "Tomorrow" ? C.gold : C.muted, fontWeight: 700, minWidth: 60, textAlign: "right" }}>{item.due}</span>
            </div>
          ))}
        </div>
      </Panel>
    </div>
  );
}

function CalendarView() {
  const typeColors = { "Meeting": C.blue, "Site Visit": C.green, "Installation": C.gold, "Follow-up Call": C.red };
  const upcomingCount = calendarEvents.length;
  const installCount = calendarEvents.filter(e => e.type === "Installation").length;
  const meetingCount = calendarEvents.filter(e => e.type === "Meeting" || e.type === "Follow-up Call").length;

  return (
    <div style={{ display: "grid", gap: 20 }}>
      <div className="kpi-grid" style={{ display: "grid", gridTemplateColumns: "repeat(3, minmax(0, 1fr))", gap: 16 }}>
        {[
          { label: "Upcoming Events", value: upcomingCount, color: C.blue, glow: C.blueSoft, icon: Icons.calendar },
          { label: "Installations Scheduled", value: installCount, color: C.gold, glow: C.goldSoft, icon: Icons.automation },
          { label: "Calls + Meetings", value: meetingCount, color: C.green, glow: C.greenSoft, icon: Icons.user },
        ].map((card) => (
          <Panel key={card.label} className="fade-in" style={{ padding: 20, position: "relative", overflow: "hidden" }}>
            <div style={{ position: "absolute", inset: "auto -20px -28px auto", width: 110, height: 110, borderRadius: "50%", background: card.glow, filter: "blur(20px)" }} />
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", gap: 12, position: "relative" }}>
              <div>
                <div style={{ fontSize: 12, color: C.muted, textTransform: "uppercase", letterSpacing: "0.16em", fontWeight: 700 }}>{card.label}</div>
                <div style={{ marginTop: 12, fontSize: 34, fontWeight: 750, letterSpacing: "-0.05em", color: card.color }}>{card.value}</div>
              </div>
              <IconBadge icon={card.icon} color={card.color} bg={card.glow} size={20} />
            </div>
          </Panel>
        ))}
      </div>

      <Panel style={{ padding: 22 }}>
        <SectionTitle
          eyebrow="Calendar"
          title="Upcoming installs, site visits, calls, and decisions"
          description="Owner-linked events pulled from Google Calendar. Kickoffs, walkthroughs, and follow-ups all in one view."
        />
        <div style={{ display: "grid", gap: 8 }}>
          {calendarEvents.map((event, index) => {
            const typeColor = typeColors[event.type] || C.muted;
            return (
              <div key={index} style={{ display: "grid", gridTemplateColumns: "auto 1fr auto", gap: 14, alignItems: "center", padding: "12px 16px", borderRadius: 16, background: "rgba(255,255,255,0.025)", border: `1px solid ${typeColor}22` }}>
                <div style={{ width: 44, textAlign: "center", background: `${typeColor}16`, border: `1px solid ${typeColor}30`, borderRadius: 10, padding: "6px 4px", flexShrink: 0 }}>
                  <div style={{ fontSize: 8, textTransform: "uppercase", color: typeColor, letterSpacing: "0.5px", fontWeight: 700 }}>{event.month}</div>
                  <div style={{ fontSize: 20, fontWeight: 700, color: C.text, lineHeight: 1.1 }}>{event.day}</div>
                </div>
                <div>
                  <div style={{ fontSize: 14, fontWeight: 700 }}>{event.title}</div>
                  <div style={{ marginTop: 4, fontSize: 12, color: C.muted }}>{event.client} · {event.time}</div>
                </div>
                <span style={{ display: "inline-flex", padding: "5px 10px", borderRadius: 999, background: `${typeColor}16`, color: typeColor, fontSize: 11, fontWeight: 700, whiteSpace: "nowrap" }}>{event.type}</span>
              </div>
            );
          })}
        </div>
      </Panel>
    </div>
  );
}

function App() {
  const [view, setView] = useState("overview");
  const [menuOpen, setMenuOpen] = useState(false);
  const closeMenu = () => setMenuOpen(false);
  const handleNav = (id) => { setView(id); closeMenu(); };

  const titles = {
    overview: {
      title: "Command Center",
      description: "Active operations across pipeline, estimates, invoices, and team activity.",
    },
    brief: {
      title: "Executive Brief",
      description: "Weekday morning summary delivered at 5:00 AM. Decisions, risk, and movement in one read.",
    },
    pipeline: {
      title: "Pipeline",
      description: "Stage movement tracked automatically. Nothing stalls without surfacing first.",
    },
    finance: {
      title: "Estimates + Invoices",
      description: "Open revenue, aging quotes, outstanding balances, and cash flow risk.",
    },
    tasks: {
      title: "Action Queue",
      description: "Open tasks, owner decisions, and what needs movement today.",
    },
    calendar: {
      title: "Calendar",
      description: "Upcoming installs, site visits, calls, and owner-linked decisions.",
    },
  };

  return (
    <div className="app-shell" style={shellStyle}>

      {/* Mobile top bar */}
      <div id="mobileBar">
        <div style={{ fontSize: 16, fontWeight: 800, letterSpacing: "-0.04em", color: "#e5eefb" }}>
          APEX <span style={{ color: "#d8a93e" }}>·</span> Mission Control
        </div>
        <button id="waffleBtn" onClick={() => setMenuOpen(o => !o)} aria-label="Open navigation">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="currentColor">
            <circle cx="2.5" cy="2.5" r="1.5"/><circle cx="9" cy="2.5" r="1.5"/><circle cx="15.5" cy="2.5" r="1.5"/>
            <circle cx="2.5" cy="9" r="1.5"/><circle cx="9" cy="9" r="1.5"/><circle cx="15.5" cy="9" r="1.5"/>
            <circle cx="2.5" cy="15.5" r="1.5"/><circle cx="9" cy="15.5" r="1.5"/><circle cx="15.5" cy="15.5" r="1.5"/>
          </svg>
        </button>
      </div>

      {/* Mobile overlay */}
      <div id="mobileOverlay" className={menuOpen ? "open" : ""} onClick={closeMenu} />

      <aside className={`sidebar${menuOpen ? " nav-open" : ""}`} style={sidebarStyle}>
        <div>
          <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
            <div style={{ width: 38, height: 38, borderRadius: 12, background: "linear-gradient(135deg, rgba(216,169,62,0.24), rgba(71,160,255,0.2))", display: "grid", placeItems: "center", border: `1px solid ${C.stroke}` }}>
              <span style={{ fontSize: 22, fontWeight: 800, color: C.gold }}>A</span>
            </div>
            <div>
              <div style={{ fontSize: 18, fontWeight: 800, letterSpacing: "-0.05em" }}>APEX</div>
              <div style={{ marginTop: 1, fontSize: 9, letterSpacing: "0.24em", color: C.muted, textTransform: "uppercase" }}>Network Systems</div>
            </div>
          </div>
          <div style={{ marginTop: 8, color: C.muted, fontSize: 11.5, lineHeight: 1.42 }}>
            Apex Network Systems — Mission Control
          </div>
        </div>

        <Panel style={{ padding: 12, background: "rgba(255,255,255,0.03)" }}>
          <div style={{ fontSize: 11, textTransform: "uppercase", letterSpacing: "0.16em", color: C.green, fontWeight: 700 }}>System Status</div>
          <div style={{ fontSize: 20, fontWeight: 760, marginTop: 8 }}>Active</div>
          <div style={{ marginTop: 3, fontSize: 12, color: C.muted }}>Brief delivered at 5:00 AM</div>
          <div style={{ marginTop: 10, display: "flex", gap: 6, flexWrap: "wrap" }}>
            <Pill text="Gmail" color={C.blue} bg={C.blueSoft} icon={Icons.mail} />
            <Pill text="Calendar" color={C.green} bg={C.greenSoft} icon={Icons.calendar} />
          </div>
        </Panel>

        <div style={{ display: "grid", gap: 3 }}>
          {navItems.map((item) => {
            const Icon = item.icon;
            const active = item.id === view;
            return (
              <button
                key={item.id}
                onClick={() => handleNav(item.id)}
                style={{
                  background: active ? "linear-gradient(90deg, rgba(216,169,62,0.18), rgba(71,160,255,0.14))" : "transparent",
                  color: active ? C.text : C.muted,
                  border: active ? `1px solid rgba(216,169,62,0.22)` : "1px solid transparent",
                  borderRadius: 15,
                  padding: "9px 12px",
                  display: "flex",
                  alignItems: "center",
                  gap: 10,
                  width: "100%",
                  minWidth: 0,
                  cursor: "pointer",
                  textAlign: "left",
                  transition: "all .2s ease",
                }}
              >
                <Icon size={16} color={active ? C.gold : C.muted} />
                <span style={{ fontSize: 13.5, fontWeight: active ? 700 : 600, flex: 1, minWidth: 0, overflowWrap: "anywhere", lineHeight: 1.2 }}>{item.label}</span>
              </button>
            );
          })}
        </div>

        <div style={{ marginTop: 2 }}>
          <Panel style={{ padding: 12, background: "rgba(255,255,255,0.03)" }}>
            <div style={{ fontSize: 11.5, color: C.muted }}>Logged in as</div>
            <div style={{ marginTop: 5, display: "flex", alignItems: "center", gap: 9 }}>
              <div style={{ width: 30, height: 30, borderRadius: 10, background: C.blueSoft, display: "grid", placeItems: "center" }}>
                <Icons.user size={16} color={C.blue} />
              </div>
              <div>
                <div style={{ fontWeight: 700, fontSize: 13.5 }}>Nate</div>
                <div style={{ fontSize: 11.5, color: C.muted }}>Owner view</div>
              </div>
            </div>
          </Panel>
        </div>
      </aside>

      <main className="main-content" style={mainStyle}>
        <div style={{ display: "grid", gap: 20 }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", gap: 16, flexWrap: "wrap" }}>
            <div>
              <div style={{ fontSize: 34, fontWeight: 780, letterSpacing: "-0.06em" }}>{titles[view].title}</div>
              <div style={{ marginTop: 8, color: C.muted, fontSize: 14, lineHeight: 1.55 }}>{titles[view].description}</div>
            </div>
            <div style={{ display: "flex", alignItems: "center", gap: 10, flexWrap: "wrap" }}>
              <Pill text="Live as of 5:00 AM" color={C.green} bg={C.greenSoft} icon={Icons.check} />
              <Pill text="April 8, 2026" color={C.blue} bg={C.blueSoft} icon={Icons.clock} />
            </div>
          </div>

          {view === "overview" ? <OverviewView /> : null}
          {view === "brief" ? <BriefView /> : null}
          {view === "pipeline" ? <PipelineView /> : null}
          {view === "finance" ? <FinanceView /> : null}
          {view === "tasks" ? <TasksView /> : null}
          {view === "calendar" ? <CalendarView /> : null}
        </div>
      </main>
    </div>
  );
}

ReactDOM.render(<App />, document.getElementById("root"));
</script>
</body>
</html>
